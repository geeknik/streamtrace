# StreamTrace UI - nginx configuration
# Serves the SolidJS SPA and proxies API requests to the backend.

upstream api_backend {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -- Security headers --------------------------------------------------
    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # -- Gzip compression --------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -- API proxy ---------------------------------------------------------
    # All /v1/* requests are forwarded to the Rust API service.
    location /v1/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Do not buffer API responses
        proxy_buffering off;
    }

    # Health / readiness probes forwarded to the API
    location = /healthz {
        proxy_pass http://api_backend;
    }

    location = /readyz {
        proxy_pass http://api_backend;
    }

    # -- SPA fallback ------------------------------------------------------
    # Serve static files; fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
